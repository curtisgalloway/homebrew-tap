# Re-pin Formula/paniolo.rb to a paniolo release tag, then build & attach
# precompiled macOS bottles so `brew install` needs no Rust toolchain.
#
# Fired automatically by paniolo's release workflow via repository_dispatch
# (event_type: paniolo-release, client_payload.tag = vX.Y.Z) once a Release is
# published. Also runnable by hand (workflow_dispatch) with an optional tag —
# omit it to pin/bottle whatever paniolo's latest release is.
#
# Pipeline (three jobs, run in order):
#   bump   - re-pin url + source-tarball sha256, strip any stale bottle block,
#            commit & push (ubuntu).
#   bottle - on Apple Silicon (macos-14): source-build the re-pinned formula
#            with --build-bottle, `brew bottle` it, and upload the tarball to a
#            `paniolo-<version>` Release on THIS repo. The bottle JSON is stashed
#            as a build artifact.
#   merge  - download the bottle JSON, `brew bottle --merge` the sha256 into the
#            formula, commit & push (ubuntu).
#
# All commits use the repo's own GITHUB_TOKEN (contents: write below); paniolo
# only needs a credential to TRIGGER this, not to push here. Bottles live on
# this repo's Releases, so no extra hosting credential is required either.
#
# A macOS version with no matching bottle (or any Linux install) still falls
# back to the source build — `depends_on "rust" => :build` makes that automatic.

name: Bump paniolo formula

on:
  repository_dispatch:
    types: [paniolo-release]
  workflow_dispatch:
    inputs:
      tag:
        description: "paniolo release tag to pin (e.g. v0.1.4); default = latest"
        required: false

permissions:
  contents: write

jobs:
  bump:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
      version: ${{ steps.tag.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Resolve target tag
        id: tag
        env:
          GH_TOKEN: ${{ github.token }}
          DISPATCH_TAG: ${{ github.event.client_payload.tag }}
          INPUT_TAG: ${{ github.event.inputs.tag }}
        run: |
          tag="${DISPATCH_TAG:-$INPUT_TAG}"
          if [ -z "$tag" ]; then
            tag=$(gh release view --repo curtisgalloway/paniolo --json tagName -q .tagName)
          fi
          case "$tag" in
            v[0-9]*) ;;
            *) echo "::error::Unexpected tag '$tag' (want vX.Y.Z)"; exit 1 ;;
          esac
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "version=${tag#v}" >> "$GITHUB_OUTPUT"

      - name: Re-pin Formula/paniolo.rb to ${{ steps.tag.outputs.tag }}
        env:
          TAG: ${{ steps.tag.outputs.tag }}
        run: |
          url="https://github.com/curtisgalloway/paniolo/archive/refs/tags/${TAG}.tar.gz"
          echo "Hashing $url"
          sha=$(curl -fsSL "$url" | sha256sum | cut -d' ' -f1)
          sed -i -E \
            "s#/archive/refs/tags/v[0-9]+\.[0-9]+\.[0-9]+\.tar\.gz#/archive/refs/tags/${TAG}.tar.gz#" \
            Formula/paniolo.rb
          sed -i -E "s#sha256 \"[0-9a-f]{64}\"#sha256 \"${sha}\"#" Formula/paniolo.rb
          # Drop the previous version's bottle block: those tarballs are for the
          # OLD version, so leaving the block would make this commit advertise
          # bottles that 404 for the new version until `merge` runs. The block
          # is line-delimited (`  bottle do` ... matching `  end`), so a simple
          # state machine removes it without regex newline math; the `merge` job
          # re-adds a correct one and `brew style --fix` tidies the whitespace.
          awk '
            /^  bottle do$/ { skip = 1; next }
            skip == 1 && /^  end$/ { skip = 0; next }
            skip == 1 { next }
            { print }
          ' Formula/paniolo.rb > Formula/paniolo.rb.tmp
          mv Formula/paniolo.rb.tmp Formula/paniolo.rb
          echo "Formula now pins:"
          grep -E '  (url|sha256) ' Formula/paniolo.rb

      - name: Commit the re-pin
        env:
          VERSION: ${{ steps.tag.outputs.version }}
        run: |
          if git diff --quiet -- Formula/paniolo.rb; then
            echo "Formula already pins ${VERSION} — nothing to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "paniolo ${VERSION}: re-pin formula (automated)" -- Formula/paniolo.rb
          # Explicit refspec: bare `git push` needs an upstream tracking ref,
          # which isn't reliably set in the CI checkout (and setup-homebrew can
          # clear it in the merge job).
          git push origin HEAD:main

  bottle:
    name: bottle (apple silicon)
    needs: bump
    # Apple Silicon only. macos-14 is the oldest GA arm64 runner, and Homebrew
    # uses a bottle tagged for any macOS <= the running one, so its arm64_sonoma
    # bottle covers Sonoma and every newer macOS. Intel (x86_64) is intentionally
    # unsupported — those Macs source-build, as does any Linux install.
    runs-on: macos-14
    steps:
      - name: Set up Homebrew
        uses: Homebrew/actions/setup-homebrew@main

      - name: Confirm the tapped formula
        run: |
          # setup-homebrew auto-taps this repo (the workflow runs inside it) and
          # points curtisgalloway/tap at a fresh clone of main — which carries
          # the re-pin, since `bottle` needs `bump`. So there's nothing to tap or
          # pull by hand (a manual `git pull` fails: that clone has no upstream).
          # Just confirm what we're about to bottle.
          tapdir="$(brew --repository curtisgalloway/tap)"
          git -C "$tapdir" log -1 --oneline || true
          grep -E '^  (url|sha256) ' "$tapdir/Formula/paniolo.rb"

      - name: Build from source into the cellar
        run: brew install --build-bottle --verbose curtisgalloway/tap/paniolo

      - name: Bottle it
        env:
          VERSION: ${{ needs.bump.outputs.version }}
        run: |
          root="https://github.com/curtisgalloway/homebrew-tap/releases/download/paniolo-${VERSION}"
          brew bottle --json --no-rebuild --root-url="$root" curtisgalloway/tap/paniolo
          # `brew bottle` writes a double-dash local name; the canonical server
          # name (and the URL brew derives) uses a single dash. Rename so the
          # uploaded asset matches what `brew install` will request.
          for f in paniolo--*.bottle.tar.gz; do mv "$f" "${f/--/-}"; done
          ls -l paniolo-*.bottle.*

      - name: Upload bottle tarball to the paniolo-${{ needs.bump.outputs.version }} Release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ needs.bump.outputs.version }}
        run: |
          # Create the Release if it doesn't exist yet, then upload --clobber so
          # re-runs at the same version replace the asset cleanly.
          gh release view "paniolo-${VERSION}" --repo curtisgalloway/homebrew-tap \
            || gh release create "paniolo-${VERSION}" --repo curtisgalloway/homebrew-tap \
                 --latest=false \
                 --title "paniolo ${VERSION} bottles" \
                 --notes "Precompiled Homebrew bottles for paniolo ${VERSION}." \
            || true
          gh release upload "paniolo-${VERSION}" --repo curtisgalloway/homebrew-tap \
            --clobber paniolo-*.bottle.tar.gz

      - name: Stash bottle JSON for the merge job
        uses: actions/upload-artifact@v4
        with:
          name: bottle-json
          path: "*.bottle.json"
          if-no-files-found: error

  merge:
    name: merge bottle block into the formula
    needs: [bump, bottle]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Homebrew
        uses: Homebrew/actions/setup-homebrew@main

      - uses: actions/download-artifact@v4
        with:
          name: bottle-json
          path: bottle-json

      - name: Merge sha256s into the formula and commit
        env:
          VERSION: ${{ needs.bump.outputs.version }}
        run: |
          # setup-homebrew points curtisgalloway/tap at this checkout, so --merge
          # edits the formula in place (it resolves the file from the formula
          # name inside each JSON). --no-all-checks skips the noarch "all" bottle
          # logic that doesn't apply to a compiled formula.
          tapdir="$(brew --repository curtisgalloway/tap)"
          brew bottle --merge --write --no-commit --no-all-checks bottle-json/*.bottle.json
          brew style --fix curtisgalloway/tap/paniolo || true
          # If the tap resolved to a separate clone rather than this checkout,
          # sync the edited formula back so the commit below picks it up.
          if [ "$(readlink -f "$tapdir/Formula/paniolo.rb")" != "$(readlink -f Formula/paniolo.rb)" ]; then
            cp "$tapdir/Formula/paniolo.rb" Formula/paniolo.rb
          fi
          if git diff --quiet -- Formula/paniolo.rb; then
            echo "No bottle changes to commit."
            exit 0
          fi
          echo "Bottle block now:"
          grep -nE '  (bottle do|root_url|sha256 cellar)' Formula/paniolo.rb || true
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "paniolo ${VERSION}: add bottles (automated)" -- Formula/paniolo.rb
          # Explicit refspec: setup-homebrew's tap symlink leaves main without an
          # upstream, so bare `git push` fails ("no upstream branch").
          git push origin HEAD:main
